<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulación Financiera</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    body { font-family: Arial; margin: 20px; }
    input, button { margin: 5px; padding: 5px; }
    table { border-collapse: collapse; margin-top: 20px; width: 100%; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f4f4f4; }
    table thead th { position: sticky; top: 0; z-index: 1; }
    .datos-iniciales{
        display: flex;
        flex-wrap: wrap;
        gap: 80px;
    }
    ul {padding-left: 1rem;}
</style>
</head>
<body>

<h2>Calculadora - <b>XORKETS <span style="color: #0F55FF;">FX</span></b></h2>

<div class="datos-iniciales">
    <form id="formulario">
        <label>Valor Inicial:</label>
        <input type="number" id="valorInicial" required><br>

        <label>Fecha Inicial:</label>
        <input type="date" id="fechaInicial" required><br>

        <label>Fecha Final:</label>
        <input type="date" id="fechaFinal" required><br>

        <label>Porcentaje (%):</label>
        <input type="number" id="porcentaje" required step="0.01"><br>

        <button type="submit" class="btn btn-primary">Calcular</button>
    </form>
    <div id="valorFinal">
        
    </div>
</div>
<br>
<div style="background-color: yellow; padding: 5px 10px;">
    <i><b>NOTA: </b>Los datos mostrados aquí son netamente aproximaciones. Las ganacias reales se basan en el porcentaje ganado por cada operación realizada. Además, esta es una simulación unicamente sin retiros realizados.</i>
</div>


<table id="tabla">
    <thead>
        <tr>
            <th>Fecha</th>
            <th>Valor</th>
            <th>Decenas</th>
            <th>Ganancia diaria</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let valor = parseFloat(document.getElementById("valorInicial").value);
    let valorInicial = parseFloat(document.getElementById("valorInicial").value);
    let fechaInicio = new Date(document.getElementById("fechaInicial").value);
    let fechaFin = new Date(document.getElementById("fechaFinal").value);
    let porcentaje = parseFloat(document.getElementById("porcentaje").value) / 100;

    // Ajustar fecha inicial
    if (fechaInicio.getDay() === 5) { // viernes
        fechaInicio.setDate(fechaInicio.getDate() + 2);
    } else if (fechaInicio.getDay() === 6) { // sábado
        fechaInicio.setDate(fechaInicio.getDate() + 1);
    }

    // Ajustar fecha final
    if (fechaFin.getDay() === 5) { // viernes
        fechaFin.setDate(fechaFin.getDate() - 1);
    } else if (fechaFin.getDay() === 6) { // sábado
        fechaFin.setDate(fechaFin.getDate() - 2);
    }

    let tbody = document.querySelector("#tabla tbody");
    tbody.innerHTML = "";

    let fechaActual = new Date(fechaInicio);

    while (fechaActual <= fechaFin) {

        let dia = fechaActual.getDay();

        // Solo domingo(0) a jueves(4)
        if (dia >= 0 && dia <= 4) {

            let ganancia = valor * porcentaje;
            let decenas = Math.floor(valor / 10) * 10;

            let fila = `
                <tr>
                    <td>${fechaActual.toISOString().split('T')[0]}</td>
                    <td>${valor.toFixed(2)}</td>
                    <td>${decenas}</td>
                    <td>${ganancia.toFixed(2)}</td>
                </tr>
            `;
            tbody.innerHTML += fila;

            valor += ganancia; // acumulación
        }

        fechaActual.setDate(fechaActual.getDate() + 1);
    }

    let valorFinal = document.getElementById("valorFinal");
    let rendimiento = ((valor - valorInicial) / valorInicial) * 100;
    let ganancia = (valor - valorInicial);
    let valorFinalhtml = `
        <p><b style="color: green; font-size: 40px;">$${valor.toFixed(2)}</b></p>
        <ul>
            <li>Inversión inicial: <b>$${valorInicial.toFixed(2)}</b></li> 
            <li>Ganancia acumulada: <b>$${ganancia.toFixed(2)}</b></li> 
            <li>Rendimiento: <b>+${rendimiento.toFixed(2)}%</b></li>    
        </ul>
    `;
    
    valorFinal.innerHTML = valorFinalhtml;
});
    
</script>

</body>
</html>
